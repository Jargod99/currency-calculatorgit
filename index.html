<!DOCTYPE html>
<html lang="pl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=!, initial-scale=1.0">
    <title>Currency-calculator</Currency-calculator></title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css"
        integrity="sha512-NhSC1YmyruXifcj/KFRWoC561YpHpc5Jtzgvbuzx5VozKpWvQ+4nXhPdFgmx8xqexRcpAglTj9sIBWINXa8x5w=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Lobster+Two:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/form.css">
    <script defer src="script/script.js"></script>
</head>

<body>
    <div class="container">
        <form class="form js-form">

            <fieldset class="from__fieldset">
                <legend class="from__legend">Currency-calculator</legend>
               
                <p>
                    <label>
                        <span class="labelText"> Kwota w złotych*:</span>
                        <input  type="number" min="0" step="0.01" required placeholder="Podaj kwotę" class="js-amount form__input" >
                    </label>
                </p>
                <p>
                    <label>
                        <span class="labelText">Waluta:</span>
                        <select  name="currency" class="js-currency form__input">
                            <option value="USD">Dolar</option>
                            <option value="EUR">Euro</option>
                            <option value="GBP">Funt</option>
                        </select>
                    </label>
                </p>
            </fieldset>
            <button class="form__button">Oblicz</button>
            <div class="form__result js-result">Wynik:</div>
        </form>
        
    </div>
</body>

</html>
